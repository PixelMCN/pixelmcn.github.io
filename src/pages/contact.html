<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Pixelmcn</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
</head>
<body>
    <header class="glass-nav">
        <div class="nav-container">
            <h1 class="logo">Pixelmcn</h1>
            <nav>
                <ul>
                    <li><a href="../../index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="projects.html">Projects</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="contact">
            <div class="contact-container">
                <div class="contact-info" data-aos="fade-right">
                    <h2 class="section-title">Get in Touch</h2>
                    <p>Have questions about my mods or want to collaborate? Feel free to reach out!</p>
                    <div class="contact-socials">
                        <a href="#" class="social-btn" title="GitHub">
                            <img src="../images/icons/github.svg" alt="GitHub">
                        </a>
                        <a href="#" class="social-btn" title="Discord">
                            <img src="../images/icons/discord.svg" alt="Discord">
                        </a>
                        <a href="#" class="social-btn" title="Email">
                            <img src="../images/icons/email.svg" alt="Email">
                        </a>
                    </div>
                </div>
                
                <form class="contact-form" data-aos="fade-left">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="6" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Pixelmcn | Built with 💜</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
